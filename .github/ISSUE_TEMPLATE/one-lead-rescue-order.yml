name: One-lead $5 rescue order
description: Use this after paying $5 for one custom quiet-lead rescue sequence.
title: "One-lead rescue order: "
labels:
  - one-lead-rescue
  - paid-order
body:
  - type: markdown
    attributes:
      value: |
        Start with the GitHub-native Buy Now packet or pinned checkout board, pay exactly $5, then submit this form if you want a GitHub fulfillment trail for one quiet lead.

        Buy Now packet: https://github.com/trungcodeer/softjunk-lead-kit/blob/main/BUY_NOW.md
        Buy Now JSON: https://raw.githubusercontent.com/trungcodeer/softjunk-lead-kit/main/buy-now.json
        Pinned public order board: https://github.com/trungcodeer/softjunk-lead-kit/issues/1
        Pinned buyer-agent close contract: https://github.com/trungcodeer/softjunk-lead-kit/issues/5
        Payment URL: https://paypal.me/softjunk/5USD
        Root one-lead rescue route: https://trungcodeer.github.io/rescue/
        Root one-lead rescue JSON: https://trungcodeer.github.io/rescue.json
        AI agent order path: https://trungcodeer.github.io/softjunk-lead-kit/agent-order.html
        Agent offer manifest: https://trungcodeer.github.io/softjunk-lead-kit/agent-offer.json
        One-lead builder: https://trungcodeer.github.io/softjunk-lead-kit/fix-one-quiet-lead.html
        Short PayPal route: https://trungcodeer.github.io/paypal/
        After-payment handoff: https://trungcodeer.github.io/softjunk-lead-kit/after-pay.html

        Use the PayPal note generated by the rescue route, builder, or agent order path. Fulfillment starts only after the $5 PayPal transaction is visible to the seller or `PAYPAL_PAYMENT_VERIFIED=true`.

        Do not include private customer names, phone numbers, email addresses, payment details, patient data, or client secrets.
  - type: input
    id: paypal-note
    attributes:
      label: PayPal note used
      description: Paste the exact note generated by the one-lead builder.
      placeholder: "Fix One Quiet Lead | Business: HVAC company | Service: AC repair estimate | Source: Website form | Tone: Professional | Blocker: price or timing | Next: schedule a service visit"
    validations:
      required: true
  - type: input
    id: business-type
    attributes:
      label: Business type
      placeholder: "HVAC company, med spa, dental office, agency"
    validations:
      required: true
  - type: input
    id: service
    attributes:
      label: Service or offer
      placeholder: "AC repair estimate, consultation, quote, appointment"
    validations:
      required: true
  - type: dropdown
    id: lead-source
    attributes:
      label: Lead source
      options:
        - Website form
        - Phone call
        - Instagram DM
        - Facebook message
        - Email
        - Referral
        - Other
    validations:
      required: true
  - type: dropdown
    id: tone
    attributes:
      label: Tone
      options:
        - Friendly
        - Professional
        - Direct
        - Premium
        - Plain
    validations:
      required: true
  - type: input
    id: blocker
    attributes:
      label: Likely blocker
      placeholder: "price, timing, trust, availability, scheduling"
    validations:
      required: true
  - type: input
    id: next-step
    attributes:
      label: Desired next step
      placeholder: "book a quick call, choose a time, schedule a visit"
    validations:
      required: true
  - type: textarea
    id: current-message
    attributes:
      label: Current weak follow-up
      description: Use placeholders and keep it non-sensitive.
      placeholder: "Hi [Name], just following up. Let me know if you are still interested."
    validations:
      required: true
  - type: textarea
    id: extra-context
    attributes:
      label: Extra non-sensitive context
      description: Optional. Do not paste private customer or payment details.
      placeholder: "The buyer asked about price and then stopped replying. SMS length is preferred."
    validations:
      required: false
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I started from https://trungcodeer.github.io/rescue/ and paid exactly $5 at https://paypal.me/softjunk/5USD or https://trungcodeer.github.io/paypal/.
          required: true
        - label: I understand fulfillment starts only after seller-side PayPal evidence exists or PAYPAL_PAYMENT_VERIFIED=true.
          required: true
        - label: I did not include private customer, patient, client, or payment data.
          required: true
