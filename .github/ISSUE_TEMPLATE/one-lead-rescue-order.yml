# No-clone checkout proof:
# Command: npm exec --yes --package https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.166/softjunk-lead-kit-0.2.2.tgz -- softjunk-lead-kit pay --mode custom --json
# Release: https://github.com/trungcodeer/softjunk-lead-kit/releases/tag/v2.29.166
# Release tarball: https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.166/softjunk-lead-kit-0.2.2.tgz
# Release tarball SHA-256 file: https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.166/softjunk-lead-kit-0.2.2.tgz.sha256
# Sponsor route: https://trungcodeer.github.io/softjunk-lead-kit/sponsor-button-buy.html
# Payment URL after packet: copy the after-packet PayPal URL from the Sponsor route only after the packet and note are ready.
# Success signal: PAYPAL_PAYMENT_VERIFIED=true
# Boundary: Do not claim paid, started, delivered, fulfilled, complete, received, or stop unless seller-side PayPal evidence exists, PayPal API verification succeeds, or trusted seller-side CSV proof verifies the 5 USD payment.
name: One-lead $5 rescue order
description: Use this after building the packet and completing the 5 USD after-packet PayPal payment for one custom quiet-lead rescue sequence.
title: "One-lead rescue order: "
labels:
  - one-lead-rescue
  - paid-order
body:
  - type: markdown
    attributes:
      value: |
        Use this form after building the packet and completing the 5 USD after-packet PayPal payment for one custom quiet-lead rescue. Fast path:

        1. Copy the Send-5 buyer handoff: https://trungcodeer.github.io/send-5/
        2. Open the root 5 USD buyer card if you need the PayPal note/link: https://trungcodeer.github.io/5/
        3. Open the packet-first Sponsor route and copy the after-packet PayPal URL only after the packet and note are ready: https://trungcodeer.github.io/softjunk-lead-kit/sponsor-button-buy.html
        4. Submit this form with placeholders only after payment.

        Machine-readable routes:
        Send-5 JSON: https://trungcodeer.github.io/send-5.json
        Buyer card JSON: https://trungcodeer.github.io/5.json
        Sponsor button route: https://trungcodeer.github.io/softjunk-lead-kit/sponsor-button-buy.html
        Sponsor button markdown: https://github.com/trungcodeer/softjunk-lead-kit/blob/main/SPONSOR_BUTTON_BUY.md
        Pinned buyer-agent close contract: https://github.com/trungcodeer/softjunk-lead-kit/issues/5
        Root one-lead rescue route: https://trungcodeer.github.io/rescue/
        After-payment handoff: https://trungcodeer.github.io/softjunk-lead-kit/after-pay.html

        Use the PayPal note generated by Send-5, the buyer card, or the rescue route. Fulfillment starts only after the $5 PayPal transaction is visible to the seller or `PAYPAL_PAYMENT_VERIFIED=true`.

        Do not include private customer names, phone numbers, email addresses, payment details, patient data, or client secrets.
  - type: input
    id: paypal-note
    attributes:
      label: PayPal note used
      description: Paste the exact note generated by the one-lead builder.
      placeholder: "Fix One Quiet Lead | Business: HVAC company | Service: AC repair estimate | Source: Website form | Tone: Professional | Blocker: price or timing | Next: schedule a service visit"
    validations:
      required: true
  - type: input
    id: business-type
    attributes:
      label: Business type
      placeholder: "HVAC company, med spa, dental office, agency"
    validations:
      required: true
  - type: input
    id: service
    attributes:
      label: Service or offer
      placeholder: "AC repair estimate, consultation, quote, appointment"
    validations:
      required: true
  - type: dropdown
    id: lead-source
    attributes:
      label: Lead source
      options:
        - Website form
        - Phone call
        - Instagram DM
        - Facebook message
        - Email
        - Referral
        - Other
    validations:
      required: true
  - type: dropdown
    id: tone
    attributes:
      label: Tone
      options:
        - Friendly
        - Professional
        - Direct
        - Premium
        - Plain
    validations:
      required: true
  - type: input
    id: blocker
    attributes:
      label: Likely blocker
      placeholder: "price, timing, trust, availability, scheduling"
    validations:
      required: true
  - type: input
    id: next-step
    attributes:
      label: Desired next step
      placeholder: "book a quick call, choose a time, schedule a visit"
    validations:
      required: true
  - type: textarea
    id: current-message
    attributes:
      label: Current weak follow-up
      description: Use placeholders and keep it non-sensitive.
      placeholder: "Hi [Name], just following up. Let me know if you are still interested."
    validations:
      required: true
  - type: textarea
    id: extra-context
    attributes:
      label: Extra non-sensitive context
      description: Optional. Do not paste private customer or payment details.
      placeholder: "The buyer asked about price and then stopped replying. SMS length is preferred."
    validations:
      required: false
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I started from https://trungcodeer.github.io/send-5/, https://trungcodeer.github.io/5/, or https://trungcodeer.github.io/rescue/, built the packet, and completed the 5 USD after-packet PayPal payment.
          required: true
        - label: I understand fulfillment starts only after seller-side PayPal evidence exists or PAYPAL_PAYMENT_VERIFIED=true.
          required: true
        - label: I did not include private customer, patient, client, or payment data.
          required: true
