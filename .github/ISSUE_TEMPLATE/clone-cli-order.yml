name: Clone CLI paid order
about: Submit non-sensitive order details after using the clone CLI and paying exactly 5 USD on PayPal.
title: "Paid clone CLI order: [business type]"
labels:
  - paid-order
  - clone-cli
body:
  - type: markdown
    attributes:
      value: |
        Use this only after paying exactly 5 USD at https://paypal.me/softjunk/5USD.

        Do not post PayPal transaction IDs, invoice IDs, payer email, customer names, phone numbers, emails, addresses, or private lead details.
        Fulfillment starts only after seller-side PayPal evidence exists or PAYPAL_PAYMENT_VERIFIED=true.
  - type: input
    id: paypal-note
    attributes:
      label: PayPal note used
      description: Paste only the non-sensitive PayPal note text generated by the CLI. Do not include transaction IDs or payer email.
      placeholder: "One Lead Rescue | Business: roofing contractor | Service: roof estimate | Source: estimate | Need: unanswered estimate | Tone: direct | Next: quote"
    validations:
      required: true
  - type: dropdown
    id: order-type
    attributes:
      label: Order type
      options:
        - Custom one-lead rescue
        - Ready digital kit
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Non-sensitive business context
      description: Use placeholders. No private customer or payment details.
      placeholder: "Business: [type]\nService: [service]\nLead source: [source]\nNeed: [follow-up need]\nTone: [friendly/professional/direct]\nNext action: [book/reply/quote/call]"
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I paid exactly 5 USD at https://paypal.me/softjunk/5USD.
          required: true
        - label: I did not include PayPal transaction IDs, payer email, or private customer details.
          required: true
        - label: I understand fulfillment starts only after seller-side PayPal verification or PAYPAL_PAYMENT_VERIFIED=true.
          required: true
