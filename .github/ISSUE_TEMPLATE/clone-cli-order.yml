# No-clone checkout proof:
# Command: npm exec --yes --package https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.151/softjunk-lead-kit-0.2.2.tgz -- softjunk-lead-kit pay --mode custom --json
# Release: https://github.com/trungcodeer/softjunk-lead-kit/releases/tag/v2.29.151
# Release tarball: https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.151/softjunk-lead-kit-0.2.2.tgz
# Release tarball SHA-256: 1bc8497b69211a11a28c4fb4cacb98fecb5911ac2b4ca20a30be7bf4456a986c
# Payment URL: https://paypal.me/softjunk/5USD
# Success signal: PAYPAL_PAYMENT_VERIFIED=true
# Boundary: Do not claim paid, started, delivered, fulfilled, complete, received, or stop unless seller-side PayPal evidence exists, PayPal API verification succeeds, or trusted seller-side CSV proof verifies the 5 USD payment.
name: Clone CLI paid order
about: Submit non-sensitive order details after using the clone CLI and completing the 5 USD PayPal payment on PayPal.
title: "Paid clone CLI order: [business type]"
labels:
  - paid-order
  - clone-cli
body:
  - type: markdown
    attributes:
      value: |
        Use this only after completing the 5 USD PayPal payment at https://paypal.me/softjunk/5USD.

        Do not post PayPal transaction IDs, invoice IDs, payer email, customer names, phone numbers, emails, addresses, or private lead details.
        Fulfillment starts only after seller-side PayPal evidence exists or PAYPAL_PAYMENT_VERIFIED=true.
  - type: input
    id: paypal-note
    attributes:
      label: PayPal note used
      description: Paste only the non-sensitive PayPal note text generated by the CLI. Do not include transaction IDs or payer email.
      placeholder: "One Lead Rescue | Business: roofing contractor | Service: roof estimate | Source: estimate | Need: unanswered estimate | Tone: direct | Next: quote"
    validations:
      required: true
  - type: dropdown
    id: order-type
    attributes:
      label: Order type
      options:
        - Custom one-lead rescue
        - Ready digital kit
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Non-sensitive business context
      description: Use placeholders. No private customer or payment details.
      placeholder: "Business: [type]\nService: [service]\nLead source: [source]\nNeed: [follow-up need]\nTone: [friendly/professional/direct]\nNext action: [book/reply/quote/call]"
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I paid exactly 5 USD at https://paypal.me/softjunk/5USD.
          required: true
        - label: I did not include PayPal transaction IDs, payer email, or private customer details.
          required: true
        - label: I understand fulfillment starts only after seller-side PayPal verification or PAYPAL_PAYMENT_VERIFIED=true.
          required: true
