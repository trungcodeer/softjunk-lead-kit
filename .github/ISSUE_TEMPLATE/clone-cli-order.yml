# No-clone checkout proof:
# Command: npm exec --yes --package https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.166/softjunk-lead-kit-0.2.2.tgz -- softjunk-lead-kit pay --mode custom --json
# Release: https://github.com/trungcodeer/softjunk-lead-kit/releases/tag/v2.29.166
# Release tarball: https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.166/softjunk-lead-kit-0.2.2.tgz
# Release tarball SHA-256 file: https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.166/softjunk-lead-kit-0.2.2.tgz.sha256
# Sponsor route: https://trungcodeer.github.io/softjunk-lead-kit/sponsor-button-buy.html
# Payment URL after packet: copy the after-packet PayPal URL from the Sponsor route only after the packet and note are ready.
# Success signal: PAYPAL_PAYMENT_VERIFIED=true
# Boundary: Do not claim paid, started, delivered, fulfilled, complete, received, or stop unless seller-side PayPal evidence exists, PayPal API verification succeeds, or trusted seller-side CSV proof verifies the 5 USD payment.
name: Clone CLI paid order
about: Submit non-sensitive order details after using the clone CLI, building the packet, and completing the 5 USD after-packet PayPal payment.
title: "Paid clone CLI order: [business type]"
labels:
  - paid-order
  - clone-cli
body:
  - type: markdown
    attributes:
      value: |
        Use this only after building the packet and completing the 5 USD after-packet PayPal payment from the packet-first Sponsor route:
        https://trungcodeer.github.io/softjunk-lead-kit/sponsor-button-buy.html

        Do not post PayPal transaction IDs, invoice IDs, payer email, customer names, phone numbers, emails, addresses, or private lead details.
        Fulfillment starts only after seller-side PayPal evidence exists or PAYPAL_PAYMENT_VERIFIED=true.
  - type: input
    id: paypal-note
    attributes:
      label: PayPal note used
      description: Paste only the non-sensitive PayPal note text generated by the CLI. Do not include transaction IDs or payer email.
      placeholder: "One Lead Rescue | Business: roofing contractor | Service: roof estimate | Source: estimate | Need: unanswered estimate | Tone: direct | Next: quote"
    validations:
      required: true
  - type: dropdown
    id: order-type
    attributes:
      label: Order type
      options:
        - Custom one-lead rescue
        - Ready digital kit
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Non-sensitive business context
      description: Use placeholders. No private customer or payment details.
      placeholder: "Business: [type]\nService: [service]\nLead source: [source]\nNeed: [follow-up need]\nTone: [friendly/professional/direct]\nNext action: [book/reply/quote/call]"
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I built or inspected the packet and completed the 5 USD after-packet PayPal payment.
          required: true
        - label: I did not include PayPal transaction IDs, payer email, or private customer details.
          required: true
        - label: I understand fulfillment starts only after seller-side PayPal verification or PAYPAL_PAYMENT_VERIFIED=true.
          required: true
