# No-clone checkout proof:
# Command: npm exec --yes --package https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.151/softjunk-lead-kit-0.2.2.tgz -- softjunk-lead-kit pay --mode custom --json
# Release: https://github.com/trungcodeer/softjunk-lead-kit/releases/tag/v2.29.151
# Release tarball: https://github.com/trungcodeer/softjunk-lead-kit/releases/download/v2.29.151/softjunk-lead-kit-0.2.2.tgz
# Release tarball SHA-256: 1bc8497b69211a11a28c4fb4cacb98fecb5911ac2b4ca20a30be7bf4456a986c
# Payment URL: https://paypal.me/softjunk/5USD
# Success signal: PAYPAL_PAYMENT_VERIFIED=true
# Boundary: Do not claim paid, started, delivered, fulfilled, complete, received, or stop unless seller-side PayPal evidence exists, PayPal API verification succeeds, or trusted seller-side CSV proof verifies the 5 USD payment.
name: Roofing estimate $5 rescue order
description: Use this after paying $5 for one custom roofing estimate follow-up rescue.
title: "Roofing estimate rescue order: "
labels:
  - roofing-estimate-rescue
  - paid-order
body:
  - type: markdown
    attributes:
      value: |
        Use this form after completing the $5 PayPal payment for one custom roofing estimate follow-up rescue.

        Root roofing route: https://trungcodeer.github.io/roofing/
        Roofing generator: https://trungcodeer.github.io/softjunk-lead-kit/roofing-estimate-generator.html
        Roofing rescue packet: https://trungcodeer.github.io/softjunk-lead-kit/roofing-estimate-rescue.html
        Payment URL: https://paypal.me/softjunk/5USD
        General Send-5 handoff: https://trungcodeer.github.io/send-5/
        Root 5 USD buyer card: https://trungcodeer.github.io/5/

        Fulfillment starts only after the $5 PayPal transaction is visible to the seller or `PAYPAL_PAYMENT_VERIFIED=true`.

        Use placeholders and non-sensitive business context only. Do not include homeowner names, phone numbers, email addresses, street addresses, insurance claim numbers, invoice IDs, transaction IDs, PayPal IDs, or private job details.
  - type: input
    id: paypal-note
    attributes:
      label: PayPal note used
      description: Paste the exact note used with the $5 PayPal payment.
      placeholder: "Roofing estimate rescue | Business: roofing contractor | Service: roof replacement estimate | Estimate status: sent/not answered | Tone: professional"
    validations:
      required: true
  - type: input
    id: business-context
    attributes:
      label: Business context
      description: Keep this generic and public-safe.
      placeholder: "Local roofing contractor, residential roof replacement, storm repair, gutter add-on"
    validations:
      required: true
  - type: dropdown
    id: roof-service
    attributes:
      label: Roof service
      options:
        - Roof replacement estimate
        - Roof repair estimate
        - Storm damage estimate
        - Leak repair estimate
        - Gutter or fascia estimate
        - Inspection follow-up
        - Other roofing estimate
    validations:
      required: true
  - type: dropdown
    id: estimate-status
    attributes:
      label: Estimate status
      options:
        - Estimate sent and no reply
        - Estimate viewed but no next step
        - Asked about price then went quiet
        - Asked about timing then went quiet
        - Comparing other contractors
        - Insurance or financing question
        - Other quiet estimate status
    validations:
      required: true
  - type: dropdown
    id: likely-blocker
    attributes:
      label: Likely blocker
      options:
        - Budget
        - Timing
        - Trust
        - Scope confusion
        - Insurance
        - Financing
        - Comparing options
        - Unknown
    validations:
      required: true
  - type: dropdown
    id: tone
    attributes:
      label: Tone
      options:
        - Professional
        - Direct
        - Friendly
        - Premium
        - Plain
    validations:
      required: true
  - type: input
    id: desired-next-step
    attributes:
      label: Desired next step
      placeholder: "approve the estimate, schedule the roof visit, answer one question, choose a scope"
    validations:
      required: true
  - type: textarea
    id: current-follow-up
    attributes:
      label: Current weak follow-up
      description: Use placeholders only. Keep private homeowner and payment data out.
      placeholder: "Hi [Name], just following up on the roof estimate. Let me know if you are interested."
    validations:
      required: true
  - type: textarea
    id: extra-context
    attributes:
      label: Extra public-safe context
      description: Optional. Do not paste private customer, claim, address, invoice, or payment data.
      placeholder: "The homeowner asked whether the project could start next month and then stopped replying. SMS length is preferred."
    validations:
      required: false
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I paid exactly $5 at https://paypal.me/softjunk/5USD after using the roofing route, Send-5 handoff, or root 5 USD buyer card.
          required: true
        - label: I understand fulfillment starts only after seller-side PayPal evidence exists or PAYPAL_PAYMENT_VERIFIED=true.
          required: true
        - label: I did not include homeowner names, phone numbers, emails, street addresses, insurance claim numbers, invoice IDs, transaction IDs, PayPal IDs, or private job details.
          required: true
